<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강한 점심 식단 만들기</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 React 코드 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS (디자인) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CATEGORY_MAP = {
      grain: { title: '곡류', bg: 'bg-yellow-100', border: 'border-yellow-300', text: 'text-yellow-700' },
      veg: { title: '채소류', bg: 'bg-green-100', border: 'border-green-300', text: 'text-green-700' },
      protein: { title: '단백질류', bg: 'bg-red-100', border: 'border-red-300', text: 'text-red-700' },
      fruit: { title: '과일류', bg: 'bg-orange-100', border: 'border-orange-300', text: 'text-orange-700' },
      dairy: { title: '유제품류', bg: 'bg-blue-100', border: 'border-blue-300', text: 'text-blue-700' },
      sugar: { title: '유지·당류', bg: 'bg-gray-200', border: 'border-gray-300', text: 'text-gray-700' },
      unknown: { title: '분석불가', bg: 'bg-slate-100', border: 'border-slate-300', text: 'text-slate-700' }
    };

    function App() {
      const [tray, setTray] = useState([]);
      const [isPerfect, setIsPerfect] = useState(false);
      const [inputValue, setInputValue] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [evaluation, setEvaluation] = useState(""); 
      const [isEvaluating, setIsEvaluating] = useState(false); 
      const inputRef = useRef(null);

      // ⭐️ 선생님, 여기에 발급받으신 진짜 API 키를 넣어주세요! ⭐️
      const apiKey = "AIzaSyAfr9cfFFLlveX3Qxthvc12j7LGe95QzHM"; 

      // 🚀 가장 안정적인 범용 AI 모델(gemini-1.5-flash) 단일 호출 함수
      const callGeminiAPI = async (payload) => {
        if (!apiKey) {
            throw new Error("API_KEY_EMPTY");
        }
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (response.ok) {
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
          }
          
          if (response.status === 404) {
            throw new Error("MODEL_NOT_FOUND"); // 404 에러 명시
          } else if (response.status === 400 || response.status === 403) {
            throw new Error("API_KEY_ERROR");
          } else {
            throw new Error(`API Error: ${response.status}`);
          }
        } catch (error) {
          throw error;
        }
      };

      // 1. 음식 영양소 분류 (AI)
      const analyzeFoodCategory = async (foodName) => {
        const systemInstruction = `당신은 초등학교 실과 영양사 선생님입니다. 사용자가 입력한 음식을 '식품 구성 자전거'의 6가지 식품군 중 하나로 분류하고 이모지를 골라주세요. 반드시 JSON 형식으로만 응답하세요: {"category": "분류ID", "emoji": "이모지"}. 
        분류 ID: grain(곡류), veg(채소류), protein(단백질류), fruit(과일류), dairy(유제품류), sugar(유지당류)`;

        const payload = {
          contents: [{ parts: [{ text: `음식: ${foodName}` }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        const text = await callGeminiAPI(payload);
        const cleanText = text.replace(/```json/g, '').replace(/```/g, '').trim();
        return JSON.parse(cleanText);
      };

      // 2. 식단 한줄평 (AI)
      const evaluateDiet = async () => {
        if (tray.length === 0) return;
        setIsEvaluating(true);
        setEvaluation("");

        const foodNames = tray.map(f => f.name).join(', ');
        const systemInstruction = "당신은 초등학교 영양사 선생님입니다. 5학년 학생이 짠 식단을 보고 칭찬과 부족한 영양소 보충 조언을 2~3문장으로 다정하게 해주세요. 이모지를 적극 사용하세요.";
        
        const payload = {
          contents: [{ parts: [{ text: `내 식단: [${foodNames}] 건강한가요?` }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
        };

        try {
          const text = await callGeminiAPI(payload);
          setEvaluation(text);
        } catch (error) {
          if (error.message === "API_KEY_ERROR" || error.message === "API_KEY_EMPTY") {
            setEvaluation("앗! API 키가 잘못되었습니다. 코드를 다시 확인해주세요! 😭");
          } else if (error.message === "MODEL_NOT_FOUND") {
            setEvaluation("앗! 구글 서버에서 AI 모델을 찾지 못했어요(404오류). API 권한 설정을 확인해주세요! 😥");
          } else {
            setEvaluation("선생님이 잠시 자리를 비우셨어요. 잠시 후 다시 시도해주세요! 😅");
          }
        } finally {
          setIsEvaluating(false);
        }
      };

      // 식판에 음식 추가
      const handleAddFood = async (e) => {
        e.preventDefault();
        const foodName = inputValue.trim();
        if (!foodName) return;

        if (tray.length >= 8) return setErrorMsg("식판이 가득 찼어요! 음식을 빼고 담아주세요.");
        if (tray.some(item => item.name === foodName)) return setErrorMsg("이미 식판에 있는 음식이에요!");

        setIsLoading(true);
        setErrorMsg("");

        try {
          const result = await analyzeFoodCategory(foodName);
          setTray([...tray, { id: Date.now().toString(), name: foodName, category: result.category || 'unknown', emoji: result.emoji || '🍽️' }]);
          setInputValue("");
          inputRef.current?.focus();
        } catch (err) {
          if (err.message === "API_KEY_ERROR" || err.message === "API_KEY_EMPTY") {
            setErrorMsg("API 키가 없습니다! 깃허브 코드에 API 키를 정확히 넣어주세요.");
          } else if (err.message === "MODEL_NOT_FOUND") {
            setErrorMsg("AI 모델 접근 오류(404)입니다. 구글 API 키 권한을 확인해주세요.");
          } else {
            setErrorMsg("음식을 분석하는 중 오류가 발생했어요. 다시 시도해주세요!");
          }
        } finally {
          setIsLoading(false);
        }
      };

      const handleRemoveFood = (foodId) => {
        setTray(tray.filter(item => item.id !== foodId));
        setErrorMsg("");
      };

      useEffect(() => { setEvaluation(""); }, [tray]);

      // 규칙 검사
      const counts = {
        grain: tray.filter(f => f.category === 'grain').length,
        veg: tray.filter(f => f.category === 'veg').length,
        protein: tray.filter(f => f.category === 'protein').length,
        fruit: tray.filter(f => f.category === 'fruit').length,
        dairy: tray.filter(f => f.category === 'dairy').length,
        sugar: tray.filter(f => f.category === 'sugar').length,
      };

      const rules = {
        rule1: counts.grain >= 1, 
        rule2: counts.veg >= 2 && counts.veg <= 3, 
        rule3: counts.protein >= 1 && counts.protein <= 2, 
        rule4: (counts.fruit + counts.dairy) >= 1, 
        rule5: counts.sugar === 0, 
      };

      useEffect(() => {
        setIsPerfect(rules.rule1 && rules.rule2 && rules.rule3 && rules.rule4 && rules.rule5);
      }, [rules]);

      return (
        <div className="min-h-screen p-4 md:p-8 font-sans text-gray-800 flex flex-col items-center">
          <div className="w-full max-w-6xl space-y-6">
            
            {/* 타이틀 */}
            <header className="text-center space-y-3 bg-white p-6 rounded-3xl shadow-sm border border-sky-100">
              <h1 className="text-3xl md:text-4xl font-extrabold text-sky-600 flex items-center justify-center gap-2">
                <span>✨</span> AI와 함께 짜는 균형 잡힌 식단
              </h1>
              <p className="text-gray-600 font-medium">먹고 싶은 메뉴를 입력하면 AI 선생님이 식품군을 분석해 줍니다!</p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 w-full">
              
              {/* 왼쪽: 검색 영역 */}
              <div className="lg:col-span-5 flex flex-col gap-6 w-full">
                <div className="bg-white rounded-3xl shadow-sm p-6 border border-gray-100 w-full">
                  <h2 className="text-xl font-bold mb-4">✍️ 먹고 싶은 음식 입력</h2>
                  
                  <form onSubmit={handleAddFood} className="flex flex-col gap-3">
                    <input
                      ref={inputRef}
                      type="text"
                      value={inputValue}
                      onChange={(e) => setInputValue(e.target.value)}
                      placeholder="예: 제육볶음, 현미밥, 깍두기"
                      className="w-full px-4 py-4 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-sky-400 text-lg"
                      disabled={isLoading}
                    />
                    <button type="submit" disabled={isLoading || !inputValue.trim()} className="w-full bg-sky-500 hover:bg-sky-600 disabled:bg-gray-300 text-white font-bold py-4 rounded-2xl transition-all shadow-sm">
                      {isLoading ? "⏳ AI 분석 중..." : "식판에 담기"}
                    </button>
                  </form>

                  {errorMsg && <div className="mt-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-xl break-words">⚠️ {errorMsg}</div>}

                  <div className="mt-6">
                    <p className="text-sm text-gray-500 font-medium mb-3">ℹ️ 추천 메뉴를 클릭해보세요!</p>
                    <div className="flex flex-wrap gap-2">
                      {['보리밥', '소불고기', '시금치무침', '배추김치', '사과', '우유'].map(item => (
                        <button key={item} type="button" onClick={() => { setInputValue(item); inputRef.current?.focus(); }} className="px-3 py-1.5 bg-sky-50 hover:bg-sky-100 text-sky-700 text-sm rounded-full">
                          {item}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* 색상 안내 */}
                <div className="bg-white rounded-3xl shadow-sm p-6 border border-gray-100 w-full">
                  <h3 className="font-bold text-gray-700 mb-3 text-sm">식품 구성 자전거 색상 안내</h3>
                  <div className="grid grid-cols-2 gap-2">
                    {Object.entries(CATEGORY_MAP).filter(([k]) => k !== 'unknown').map(([key, info]) => (
                      <div key={key} className="flex items-center gap-2 text-sm font-medium">
                        <span className={`w-4 h-4 rounded-full ${info.bg} border-2 ${info.border}`}></span> {info.title}
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* 오른쪽: 식판 영역 */}
              <div className="lg:col-span-7 flex flex-col gap-6 w-full">
                <div className="bg-white rounded-3xl shadow-sm p-6 border border-gray-100 w-full">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-xl font-bold">🍱 나의 AI 식판 ({tray.length}개)</h2>
                    <button onClick={() => setTray([])} className="text-sm text-gray-500 hover:text-red-500 bg-gray-50 px-3 py-1.5 rounded-full">🗑️ 비우기</button>
                  </div>
                  
                  <div className="bg-gray-100 rounded-2xl p-4 min-h-[260px] shadow-inner border-4 border-gray-200 flex flex-wrap content-start gap-3">
                    {tray.length === 0 ? (
                      <div className="w-full flex flex-col items-center justify-center text-gray-400 py-10">
                        <span className="text-5xl mb-3 opacity-30">🍴</span>
                        <p className="font-medium">음식을 추가해 보세요!</p>
                      </div>
                    ) : (
                      tray.map(food => {
                        const style = CATEGORY_MAP[food.category] || CATEGORY_MAP.unknown;
                        return (
                          <div key={food.id} onClick={() => handleRemoveFood(food.id)} className={`relative group cursor-pointer w-[90px] h-[95px] rounded-2xl shadow-sm flex flex-col items-center justify-center ${style.bg} border-2 ${style.border} hover:scale-105 transition-transform`}>
                            <span className="text-3xl mb-1">{food.emoji}</span>
                            <span className={`text-[11px] font-bold mt-1 px-1 text-center leading-tight break-words w-full ${style.text}`}>{food.name}</span>
                            <div className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 flex items-center justify-center text-xs">❌</div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>

                {/* 규칙 검사 영역 */}
                <div className={`rounded-3xl shadow-sm p-6 border-2 transition-colors w-full ${isPerfect ? 'bg-green-50 border-green-400' : 'bg-white border-gray-100'}`}>
                  <h2 className="text-xl font-bold mb-5">📋 균형 잡힌 식단 분석</h2>
                  
                  <div className="space-y-4">
                    <RuleRow ok={rules.rule1} title="1. 매끼 곡류를 주식으로 (1개 이상)" count={counts.grain} items={tray.filter(f=>f.category==='grain')} color="text-yellow-600" />
                    <RuleRow ok={rules.rule2} title="2. 매끼 채소류 2~3가지" count={counts.veg} items={tray.filter(f=>f.category==='veg')} color="text-green-600" isWarn={counts.veg > 3} />
                    <RuleRow ok={rules.rule3} title="3. 고기·생선·달걀·콩류 1~2가지" count={counts.protein} items={tray.filter(f=>f.category==='protein')} color="text-red-500" isWarn={counts.protein > 2} />
                    <RuleRow ok={rules.rule4} title="4. 과일류나 우유 (점심에 1개 이상)" count={counts.fruit + counts.dairy} items={tray.filter(f=>f.category==='fruit'||f.category==='dairy')} color="text-blue-500" />
                    <RuleRow ok={rules.rule5} title="5. 유지, 당류는 소량만 (0개 권장)" count={counts.sugar} items={tray.filter(f=>f.category==='sugar')} color="text-gray-500" isWarn={counts.sugar > 0} isSugar={true} />
                  </div>

                  {isPerfect && (
                    <div className="mt-6 p-4 bg-green-500 text-white rounded-2xl text-center font-bold animate-bounce shadow-lg">
                      ✨ 훌륭해요! 완벽하게 균형 잡힌 건강한 점심 식단입니다! ✨
                    </div>
                  )}

                  {/* 영양사 평가 버튼 */}
                  {tray.length > 0 && (
                    <div className="mt-6 bg-indigo-50 rounded-2xl p-5 border border-indigo-100 w-full">
                      <button onClick={evaluateDiet} disabled={isEvaluating} className="w-full bg-indigo-500 hover:bg-indigo-600 disabled:bg-indigo-300 text-white font-bold py-3 rounded-xl transition-all shadow-sm">
                        {isEvaluating ? "⏳ 선생님이 식단을 살펴보고 계셔요..." : "✨ AI 영양사 선생님께 식단 평가받기 ✨"}
                      </button>

                      {evaluation && (
                        <div className="mt-4 p-4 bg-white rounded-xl border border-indigo-100 text-gray-700 leading-relaxed shadow-inner">
                          <div className="font-bold text-indigo-600 mb-2">👩‍🍳 AI 영양사 선생님의 한마디:</div>
                          <p className="whitespace-pre-wrap">{evaluation}</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 규칙 검사 행 컴포넌트
    function RuleRow({ ok, title, count, items, color, isWarn = false, isSugar = false }) {
      return (
        <div className="flex justify-between items-center p-3 rounded-xl bg-gray-50 border border-gray-100">
          <div className="flex items-center gap-3">
            <span className="text-xl flex-shrink-0">{ok ? '✅' : (isSugar ? '❌' : '⚠️')}</span>
            <div>
              <p className={ok ? 'font-bold text-gray-800' : (isSugar ? 'text-red-600 font-bold' : 'text-gray-600 font-medium')}>{title}</p>
              {count > 0 && <p className={`text-xs mt-1 break-words ${color}`}>{items.map(f => f.name).join(', ')}</p>}
            </div>
          </div>
          <span className={`text-sm font-bold border px-3 py-1.5 rounded-lg shadow-sm whitespace-nowrap ml-2 ${isWarn ? 'bg-red-50 border-red-200 text-red-600' : 'bg-white border-gray-200'}`}>
            {count}개
          </span>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
